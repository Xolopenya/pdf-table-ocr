# ============================================================================
#  Конфигурация конвейера «рукописные буровые журналы → Excel».
#  Архитектура: КОЛОНКИ из фикс-спек (forms_layout), СТРОКИ из горизонталей
#  (preprocess.extract_grid), текст — гибрид Qwen(раскладка)+Yandex(рукопись).
#  Все константы здесь; в коде магических чисел нет.
# ============================================================================

reference_pdf: "data/raw/Дуга БЛ 4-2021.pdf"   # 22 стр., полный набор объектов
reference_family: "2021"                        # 300 dpi, чёткий скан RICOH

paths:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  output_dir: "data/output"
  templates_dir: "templates"
  cache_dir: ".cache"
  eval_dir: "eval"

render_dpi: 300
poppler_path: ""            # необяз.: путь к bin с pdftoppm; пусто = автопоиск

extract_forms: true         # титул/АКТ как key-value листы
engine: "hybrid"            # hybrid | yandex | qwen

# ---- Идентификация скважин: по ПОЗИЦИИ разворота (1..N), НЕ по OCR ----------
# Канонический список номеров скважин по порядку в файле (ключ = stem PDF).
# Если задан — номер берётся из него по позиции; OCR-номер идёт в _meta как
# подсказка (needs_review при расхождении). Если не задан — номер из OCR/позиции.
borehole_numbers:
  "Дуга БЛ 4-2021": [2, 3, 4, 5, 6, 7, 8, 9, 10, 12, 14]

# ---- Инвентаризация (локатор объектов; КОЛОНКИ отсюда НЕ берём) -----------
inventory:
  # дискриминатор главной таблицы: число надёжных горизонталей (у главной 27–32)
  main_h_lines_min: 15
  # «высокая» таблица во всю половину -> половина ГЛАВНОЙ таблицы
  main_height_frac: 0.55
  min_region_area_frac: 0.015
  # морфология для поиска регионов-таблиц по маске сетки
  region_close_px: 25
  region_dilate_px: 15

# ---- Yandex Vision OCR ----------------------------------------------------
ocr_yandex:
  language_codes: ["ru", "en"]
  timeout_sec: 60
  max_retries: 4
  backoff_base_sec: 1.5
  use_cache: true

# ---- Qwen-VL через OpenRouter (раскладка строк/колонок + ditto) -----------
ocr_qwen:
  endpoint: "https://openrouter.ai/api/v1/chat/completions"
  model: "qwen/qwen3-vl-235b-a22b-instruct"
  temperature: 0
  max_tokens: 8192
  timeout_sec: 120
  max_retries: 3
  backoff_base_sec: 2.0
  max_edge_px: 2200          # даунскейл длинной стороны перед отправкой
  use_cache: true

# ---- Гибрид --------------------------------------------------------------
hybrid:
  # допуск кластеризации слов Yandex в строку по Y (px @ render_dpi)
  row_cluster_tol_px: 24
  # точечный добор: повторный OCR бледных инк-но-пустых ячеек гр9-18 с бОльшим
  # апскейлом (платный, только по таким ячейкам). На эталоне 4-2021 добор ничего
  # не вытянул (потолок OCR по бледной рукописи) -> по умолчанию ВЫКЛ. Включить,
  # если на других сканах числа/коды бледные, но читаемые.
  upscale_retry: false
  upscale_retry_target: 220
  # порог «непустого» слота (доля тёмных пикселей чернил) для геом. раскладки
  cell_ink_ratio: 0.02
  # порог «низкой уверенности» -> оранжевая заливка / needs_review
  lowconf_threshold: 0.55
  # непустые ячейки Qwen переспрашиваем у Yandex; ditto/пустые — нет
  reask_yandex_on_nonempty: true
  # доп. поле вокруг вычисленного bbox ячейки перед кропом (px)
  cell_pad_px: 4

# ---- Экспорт -------------------------------------------------------------
export:
  lowconf_threshold: 0.55
  write_meta: true

logging:
  level: "INFO"
